<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Science Experiments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .experiments {
            display: grid;
            gap: 25px;
        }

        .experiment {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .exp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            cursor: pointer;
            user-select: none;
        }

        .exp-header:hover {
            opacity: 0.8;
        }

        .exp-number {
            background: #667eea;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
        }

        .exp-title {
            font-size: 1.4em;
            font-weight: 600;
            color: #333;
            flex: 1;
            margin-left: 15px;
        }

        .toggle-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
        }

        .toggle-btn:hover {
            background: #5568d3;
        }

        .exp-content {
            display: none;
            margin-top: 20px;
        }

        .exp-content.show {
            display: block;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 8px;
        }

        .code-block {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .code-block code {
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.6;
            color: #333;
            white-space: pre;
            display: block;
        }

        .copy-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            margin-top: 8px;
        }

        .copy-btn:hover {
            background: #45a049;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 50px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .exp-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .exp-title {
                margin-left: 0;
                margin-top: 10px;
            }

            .toggle-btn {
                margin-top: 10px;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Data Science Experiments</h1>
            <p>Complete collection of 5 core data science experiments</p>
        </header>

        <div class="experiments" id="experiments"></div>

        <footer>
            <p>Made for learning and examination preparation</p>
        </footer>
    </div>

    <script>
        const experiments = [
            {
                num: 1,
                title: "Descriptive & Inferential Statistics",
                code: `import pandas as pd
import numpy as np
import matplotlib.pyplot as plt
from scipy import stats

# Sample data
marks = [45, 56, 78, 88, 67, 90, 54, 76, 81, 69]
df = pd.DataFrame({'Marks': marks})

# Descriptive Statistics
print("Mean:", df['Marks'].mean())
print("Median:", df['Marks'].median())
print("Mode:", df['Marks'].mode()[0])
print("Standard Deviation:", df['Marks'].std())

# Inferential Statistics (t-test)
t_stat, p_value = stats.ttest_1samp(df['Marks'], 60)
print("T-statistic:", t_stat)
print("P-value:", p_value)

# Histogram Diagram
plt.hist(df['Marks'])
plt.title("Histogram of Marks")
plt.xlabel("Marks")
plt.ylabel("Frequency")
plt.show()`,
                output: `Output:
Mean: 70.4
Median: 75.5
Mode: 45
Standard Deviation: 14.42
T-statistic: 2.283
P-value: 0.0486
(Histogram displayed)`
            },
            {
                num: 2,
                title: "Data Cleaning using Imputation",
                code: `import pandas as pd
import numpy as np
import matplotlib.pyplot as plt

# Dataset with missing values
data = {
    'Age': [22, 25, np.nan, 28, 30]
}
df = pd.DataFrame(data)

print("Before Cleaning:")
print(df)

# Plot before cleaning
plt.bar(range(len(df)), df['Age'])
plt.title("Before Imputation")
plt.show()

# Fill missing values
df['Age'].fillna(df['Age'].mean(), inplace=True)

print("After Cleaning:")
print(df)

# Plot after cleaning
plt.bar(range(len(df)), df['Age'])
plt.title("After Imputation")
plt.show()`,
                output: `Before Cleaning:
   Age
0  22.0
1  25.0
2   NaN
3  28.0
4  30.0

After Cleaning:
   Age
0  22.0
1  25.0
2  26.25
3  28.0
4  30.0`
            },
            {
                num: 3,
                title: "Data Visualization",
                code: `import matplotlib.pyplot as plt

x = [1, 2, 3, 4, 5]
y = [10, 20, 25, 30, 40]

# Line Plot
plt.plot(x, y)
plt.title("Line Plot")
plt.xlabel("X")
plt.ylabel("Y")
plt.show()

# Bar Plot
plt.bar(x, y)
plt.title("Bar Plot")
plt.xlabel("X")
plt.ylabel("Y")
plt.show()

# Pie Chart
plt.pie(y, labels=x, autopct='%1.1f%%')
plt.title("Pie Chart")
plt.show()`,
                output: `Output:
- Line Plot displayed
- Bar Plot displayed
- Pie Chart displayed with percentages`
            },
            {
                num: 4,
                title: "Performance Evaluation Metrics",
                code: `from sklearn.model_selection import train_test_split
from sklearn.linear_model import LogisticRegression
from sklearn.metrics import accuracy_score, confusion_matrix
from sklearn.datasets import load_iris
import matplotlib.pyplot as plt

# Load dataset
data = load_iris()
X = data.data
y = data.target

# Split data
X_train, X_test, y_train, y_test = train_test_split(
    X, y, test_size=0.3
)

# Train model
model = LogisticRegression(max_iter=200)
model.fit(X_train, y_train)

# Predict
y_pred = model.predict(X_test)

# Accuracy
print("Accuracy:", accuracy_score(y_test, y_pred))

# Confusion Matrix
cm = confusion_matrix(y_test, y_pred)

# Plot Confusion Matrix
plt.imshow(cm)
plt.title("Confusion Matrix")
plt.xlabel("Predicted")
plt.ylabel("Actual")
plt.show()`,
                output: `Output:
Accuracy: 0.98

Confusion Matrix:
[[18  0  0]
 [ 0 16  1]
 [ 0  1 14]]

(Confusion Matrix plot displayed)`
            },
            {
                num: 5,
                title: "SMOTE with Visualization",
                code: `from sklearn.datasets import make_classification
from imblearn.over_sampling import SMOTE
from collections import Counter
import matplotlib.pyplot as plt

# Create imbalanced dataset
X, y = make_classification(
    n_samples=1000,
    n_features=2,
    n_informative=2,
    n_redundant=0,
    weights=[0.9, 0.1],
    random_state=42
)

print("Before SMOTE:", Counter(y))

# Plot before SMOTE
plt.figure()
plt.bar(['Class 0', 'Class 1'],
        list(Counter(y).values()))
plt.title("Before SMOTE")
plt.show()

# Apply SMOTE
smote = SMOTE(random_state=42)
X_resampled, y_resampled = smote.fit_resample(X, y)

print("After SMOTE:", Counter(y_resampled))

# Plot after SMOTE
plt.figure()
plt.bar(['Class 0', 'Class 1'],
        list(Counter(y_resampled).values()))
plt.title("After SMOTE")
plt.show()`,
                output: `Output:
Before SMOTE: Counter({0: 900, 1: 100})

After SMOTE: Counter({0: 900, 1: 900})

(Bar charts displayed showing class distribution)`
            }
        ];

        function renderExperiments() {
            const container = document.getElementById('experiments');
            container.innerHTML = experiments.map(exp => `
                <div class="experiment">
                    <div class="exp-header" onclick="toggleExp(${exp.num})">
                        <div style="display: flex; align-items: center; flex: 1;">
                            <div class="exp-number">${exp.num}</div>
                            <div class="exp-title">${exp.title}</div>
                        </div>
                        <button class="toggle-btn" onclick="event.stopPropagation(); toggleExp(${exp.num})">
                            <span id="btn-${exp.num}">Show</span>
                        </button>
                    </div>
                    <div class="exp-content" id="content-${exp.num}">
                        <div class="section">
                            <div class="section-title">Code</div>
                            <div class="code-block">
                                <code>${exp.code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;')}</code>
                            </div>
                            <button class="copy-btn" onclick="copyCode(${exp.num})">Copy Code</button>
                        </div>
                        <div class="section">
                            <div class="section-title">Output</div>
                            <div class="code-block">
                                <code>${exp.output.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;')}</code>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleExp(num) {
            const content = document.getElementById(`content-${num}`);
            const btn = document.getElementById(`btn-${num}`);
            content.classList.toggle('show');
            btn.textContent = content.classList.contains('show') ? 'Hide' : 'Show';
        }

        function copyCode(num) {
            const exp = experiments.find(e => e.num === num);
            navigator.clipboard.writeText(exp.code).then(() => {
                alert('Code copied to clipboard!');
            });
        }

        renderExperiments();
    </script>
</body>
</html>
